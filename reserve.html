<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>予約 | 京彩レンタル</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1 class="logo">京彩レンタル</h1>
</header>

<section class="reserve">
  <h2>ご予約フォーム</h2>

  <form>
    <label>お名前</label>
    <input type="text" placeholder="山田 花子">

    <label>メールアドレス</label>
    <input type="email" placeholder="example@email.com">

    <label>ご利用日</label>
    <input type="date">

    <label>プラン選択</label>
    <select>
      <option>スタンダードプラン</option>
      <option>プレミアムプラン</option>
    </select>

    <button type="submit" class="btn">予約を送信する</button>
  </form>
</section>

<footer>
  <p>© 2026 京彩レンタル</p>
</footer>

</body>
</html>
