<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>京彩レンタル｜京都で纏う、上質な一日</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

  <!-- ===== ヘッダー ===== -->
  <header>
    <h1 class="logo">京彩レンタル</h1>
    <p class="tagline">Kyosai Rental</p>
    <nav>
      <ul>
        <li><a href="#plan">装い</a></li>
        <li><a href="#gallery">写真</a></li>
        <li><a href="reserve.html">ご予約</a></li>
      </ul>
    </nav>
  </header>


  <!-- ===== ファーストビュー ===== -->
  <section class="fv">
    <div class="fv-content">
      <h2>私を纏う、京の時間。</h2>
      <p>上質な着物レンタルで、思い出に残る時間を。</p>
      <a href="reserve.html" class="btn">今すぐ予約する</a>
    </div>
  </section>

<section class="concept">
  <h2>京彩レンタルの想い</h2>

  <p class="catch">
    ただ着物を着るのではなく、
    京都という時間を纏う。
  </p>

  <p>
    京彩レンタルは、観光のひとときを
    より上質に彩るための着物体験をご提案します。
  </p>
</section>

  <!-- ===== プラン ===== -->
  <section id="plan" class="plan">
    <h2>装いのご案内</h2>

    <div class="plan-container">

      <div class="plan-card">
        <h3>スタンダードプラン</h3>
        <p>気軽に楽しめる基本プラン</p>
        <p class="price">¥5,000〜</p>
      </div>

      <div class="plan-card">
        <h3>プレミアムプラン</h3>
        <p>ワンランク上の上質な装い</p>
        <p class="price">¥8,000〜</p>
      </div>

    </div>
  </section>


  <!-- ===== ギャラリー ===== -->
  <section id="gallery" class="gallery">
    <h2>京の景色と、装い</h2>
<p class="gallery-lead">
  京都の街並みに溶け込む、上質なひととき。
</p>

    <div class="gallery-container">
      <img src="gallery1.jpg" alt="着物イメージ1">
      <img src="gallery2.jpg" alt="着物イメージ2">
      <img src="gallery3.jpg" alt="着物イメージ3">
    </div>
  </section>


  <!-- ===== フッター ===== -->
  <footer>
    <p>© 2026 京彩レンタル</p>
  </footer>

</body>
</html>
